kind = "web"
previewPath = "/"
title = "CubePaint"
version = "1.0.0"
id = "artifacts/cubepaint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21192

[services.development]
run = "pnpm --filter @workspace/cubepaint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cubepaint", "run", "build" ]
publicDir = "artifacts/cubepaint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21192"
BASE_PATH = "/"
